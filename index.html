function playTone(freq=120,dur=.08,type='sine',gain=.055,filterFreq=650){
 if(!audioCtx)return;
 const now=audioCtx.currentTime;
 const osc=audioCtx.createOscillator();
 const filter=audioCtx.createBiquadFilter();
 const g=audioCtx.createGain();
 osc.type=type;
 filter.type='lowpass';
 filter.frequency.setValueAtTime(filterFreq,now);
 osc.frequency.setValueAtTime(freq,now);
 osc.frequency.exponentialRampToValueAtTime(Math.max(24,freq*.38),now+dur);
 g.gain.setValueAtTime(Math.min(.72,gain*SFX_MASTER),now);
 g.gain.exponentialRampToValueAtTime(.001,now+dur);
 osc.connect(filter);filter.connect(g);g.connect(audioCtx.destination);
 osc.start(now);osc.stop(now+dur+.025);
}
let sfxLast={};
function sfx(kind,power=1){
 if(!audioCtx)return;
 const now=audioCtx.currentTime;
 const gap={punch:.055,heavy:.09,boom:.12,collapse:.45,hurt:.12,sonic:.55,burn:.16,whoosh:.08,win:.1}[kind]||.08;
 if(sfxLast[kind] && now-sfxLast[kind]<gap)return;
 sfxLast[kind]=now;
 // 柔化后的 V15 风格合成音：不再使用刺耳的电流感方波/锯齿叠加。
 if(kind==='punch'){
  playTone(150,.075,'triangle',.060*power,720);playTone(70,.10,'sine',.030*power,360);
 }else if(kind==='heavy'){
  playTone(96,.14,'triangle',.085*power,520);setTimeout(()=>playTone(48,.15,'sine',.050*power,310),28);
 }else if(kind==='boom'){
  playTone(58,.22,'triangle',.075*power,430);setTimeout(()=>playTone(34,.26,'sine',.055*power,260),30);
 }else if(kind==='collapse'){
  playTone(46,.30,'triangle',.090*power,360);setTimeout(()=>playTone(30,.42,'sine',.070*power,240),55);setTimeout(()=>playTone(72,.10,'triangle',.030*power,500),120);
 }else if(kind==='hurt'){
  playTone(180,.13,'triangle',.065*power,650);playTone(82,.12,'sine',.035*power,300);
 }else if(kind==='sonic'){
  playTone(520,.08,'sine',.060*power,900);setTimeout(()=>playTone(76,.22,'triangle',.080*power,360),35);
 }else if(kind==='burn'){
  playTone(88,.12,'triangle',.035*power,360);playTone(155,.08,'sine',.018*power,500);
 }else if(kind==='whoosh'){
  playTone(250,.09,'triangle',.035*power,760);playTone(120,.12,'sine',.020*power,400);
 }else if(kind==='win'){
  playTone(330,.12,'triangle',.055*power,720);setTimeout(()=>playTone(520,.18,'triangle',.055*power,900),120);
 }else{
  playTone(110,.10,'sine',.040*power,400);
 }
}

 }

function updatePlayerPose(dt,sprint){let p=player.parts;if(!p)return;

 let leanForward=THREE.MathUtils.clamp(-localForward*.0045,-.24,.18);

 if(p.pose>.02){
   // local +Y 是角色身体轴；-90° 让身体横过来，再叠加 pitch 指向准星上下方向。

   player.mesh.rotation.z=0;
 }else if(airborne){
   player.mesh.rotation.x=leanForward;
   player.mesh.rotation.z=leanSide;
 }else{
   player.mesh.rotation.x=0;
   player.mesh.rotation.z=0;
 }
 let time=performance.now()*.010;
 let swing=Math.sin(time*5.0)*.018;
 let flightShake=airborne&&!sprint?Math.sin(time*7.2)*.018:0;
 // V41：四肢也跟随身体的移动倾斜，不再像挂在身体上的硬杆。

 let limbRoll=airborne&&!sprint?leanSide*.90:0;
 let walkAmount=(player.mode==='walk'&&player.onGround)?Math.min(1,horizontal/42):0;
 for(let i=0;i<p.arms.length;i++){

   }else{

   }
 }
 for(let i=0;i<p.legs.length;i++){
   let side=i===0?-1:1,leg=p.legs[i];let fly=p.pose;let walk=Math.sin(time*6+side*Math.PI)*.36*walkAmount;leg.rotation.order='XYZ';

   if(!s)return false;tmin=Math.max(tmin,s[0]);tmax=Math.min(tmax,s[1]);if(tmin>tmax)return false;
 }
 return tmax>=0&&tmin<=1&&tmax>.015;
}
function hasLineOfSight(a,b){
 // 只让完整建筑挡锁定；被摧毁/车辆/废墟不挡，避免误判。
 for(let box of buildings){let u=box.userData;if(!u||u.destroyed||u.type!=='building')continue;if(segmentHitsBox(a,b,box,.45))return false;}
 return true;
}

function blockAttackDashThroughWalls(from,to){
 if((player.attackDash||0)<=0)return;
 for(let b of buildings){let u=b.userData;if(u.destroyed||u.type!=='building')continue;
  if(segmentHitsBox(from,to,b,1.25)){
   player.pos.copy(from);
   player.vel.multiplyScalar(.08);
   player.attackDash=0; locked=null;
   impact(from.clone().add(new THREE.Vector3(0,1,0)),.55);addShake(.10);show('攻击被建筑挡住');
   return;
  }
 }
}
function sweptBuildingCollision(from,to,speed,sprinting){
 if(!sprinting||speed<38)return;
 for(let b of buildings){let u=b.userData;if(u.destroyed||u.type!=='building')continue;
  if(segmentHitsBox(from,to,b,2.4)){let dmg=260+speed*5.6;u.hp-=dmg;if(!u.cracked){u.cracked=true;addCrack(b)}impact(to.clone(),Math.min(2.4,.85+speed/160));addShake(Math.min(.95,.42+speed/330));sfx('boom');
   if(u.hp<=0||speed>90)collapse(b); // 高速超人冲撞：命中普通楼必定塌
  }
 }
}
function checkBuildingCollision(obj,isPlayer){let p=obj.pos;for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let bp=b.position;let hw=(u.w||4)/2+1,hd=(u.d||3)/2+1,h=u.h||2;if(Math.abs(p.x-bp.x)<hw&&Math.abs(p.z-bp.z)<hd&&p.y<h+1){let speed=obj.vel.length(),sprinting=isPlayer&&(keys.ShiftLeft||keys.ShiftRight)&&speed>22;let normalFlightHit=isPlayer&&!sprinting&&player.mode==='flight'&&speed>18;if(speed>9){let dmg;if(normalFlightHit){let now=performance.now()/1000;if(now-(u.lastNormalHit||-999)>.36){u.normalHits=(u.normalHits||0)+1;u.lastNormalHit=now;show('普通飞行撞击 '+Math.min(3,u.normalHits)+'/3');impact(p.clone(),Math.min(1.45,.65+speed/105));addShake(Math.min(.14,.045+speed/1300));}dmg=Math.max(28,(u.max||u.hp||180)*.29);u.hp=Math.min(u.hp,u.max||u.hp)-dmg;if(!u.cracked){u.cracked=true;addCrack(b)}if((u.normalHits||0)>=3||u.hp<=0)collapse(b);}else{dmg=speed*(isPlayer?(sprinting?7.8:1.05):1.35);u.hp-=dmg;if(!isPlayer&&obj.hp!==undefined)obj.hp-=speed*.12;if(!u.cracked){u.cracked=true;addCrack(b)}impact(p.clone(),Math.min(2.0,speed/48));addShake(Math.min(.18,.055+speed/850));if(u.hp<=0||(isPlayer&&sprinting&&speed>80))collapse(b);}}if(isPlayer&&sprinting){continue}let away=p.clone().sub(bp);away.y=0;if(away.lengthSq()<.001)away.set(1,0,0);away.normalize();p.addScaledVector(away,isPlayer?.08:1.2);obj.vel.reflect(away).multiplyScalar(isPlayer?.20:.24)}}}
function damageCone(pos,dir,amount,rad){for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let to=b.position.clone().sub(pos);let d=to.length();if(d<rad+Math.max(u.w||2,u.d||2)*.35&&to.normalize().dot(dir)>.35){u.hp-=amount*1.8;if(!u.cracked){u.cracked=true;addCrack(b)}if(u.hp<=0)collapse(b)}}for(let e of enemies){if(e.dead)continue;let to=e.pos.clone().add(new THREE.Vector3(0,1,0)).sub(pos);if(to.length()<rad+2&&to.normalize().dot(dir)>.25)hitEnemy(e,dir,amount>25)}damagePeople(pos,dir,amount,rad);}
function damageNearbyBuilding(pos,amount){let best=null,bd=9;for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let d=Math.hypot(pos.x-b.position.x,pos.z-b.position.z);if(d<bd){bd=d;best=b}}if(best){best.userData.hp-=amount;if(!best.userData.cracked){best.userData.cracked=true;addCrack(best)}if(best.userData.hp<=0)collapse(best)}}
function addCrack(b){let u=b.userData;if(u.type==='car')return;let c=new THREE.Mesh(new THREE.PlaneGeometry(4+Math.random()*3,4+Math.random()*3),basic(0x090909,.62));c.position.set(b.position.x,Math.min(u.h-1,3+Math.random()*u.h*.45),b.position.z+u.d/2+.05);cityAdd(c);u.decor.push(c)}
function collapse(b){let u=b.userData;if(u.destroyed)return;sfx('collapse',1.0);u.destroyed=true;for(let d of u.decor||[])removeObj(d);removeObj(b);let count=u.type==='building'?Math.min(18,7+Math.floor((u.h||10)/5)):6;for(let i=0;i<count;i++){let sz=u.type==='building'?.9+Math.random()*1.8:.5+Math.random();let c=new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),mat(u.type==='building'?0x746d64:0x30353a));c.position.set(b.position.x+(Math.random()-.5)*(u.w||5),1+Math.random()*Math.min(u.h||4,18),b.position.z+(Math.random()-.5)*(u.d||5));cityAdd(c);particles.push({mesh:c,life:1.5+Math.random()*.8,max:2.3,vel:new THREE.Vector3((Math.random()-.5)*18,Math.random()*15,(Math.random()-.5)*18),type:'debris'});}let stump=new THREE.Mesh(new THREE.BoxGeometry(u.w||4,Math.max(.35,(u.h||2)*.08),u.d||4),mat(0x2e3030));stump.position.set(b.position.x,Math.max(.22,(u.h||2)*.04),b.position.z);cityAdd(stump);impact(b.position.clone(),2.05);addShake(u.type==='building'?.95:.55);if(u.type==='building'){let dead=100+Math.floor(Math.random()*301);buildingCasualties+=dead;show('你害死了 '+dead+' 人');if(buildingCasualties>2500)spawnProtesters()}else show('车辆被砸烂！')}
function kill(e){e.dead=true;removeObj(e.mesh);kills++;bloodBurst(e.pos,0x8d0f0f);if(locked===e)locked=null;if(player.stickyTarget===e)player.stickyTarget=null;impact(e.pos.clone().add(new THREE.Vector3(0,1,0)),1.1);show(e.boss?'Boss 击败':'敌人击败')}
function playerDamage(a,dir){if(player.hitCd>0)return;sfx('hurt');player.hitCd=.42;player.hp-=a;damageFlash=.38;player.vel.addScaledVector(dir,-13);addShake(.52);impact(player.pos.clone(),.55);if(player.hp<=0){deathReason='菜就多练';finish(false)}}
function impact(pos,power=1){let ring=new THREE.Mesh(new THREE.RingGeometry(.7*power,2.7*power,22),basic(0xc7bcae,.45));ring.position.copy(pos);ring.rotation.x=-Math.PI/2;scene.add(ring);particles.push({mesh:ring,life:.34,max:.34,type:'ring'});let n=Math.min(12,Math.floor(5+power*5));for(let i=0;i<n;i++){let m=new THREE.Mesh(new THREE.BoxGeometry(.22,.22,.22),mat(0x81786e));m.position.copy(pos);scene.add(m);particles.push({mesh:m,life:.75+Math.random()*.35,max:1.1,vel:new THREE.Vector3((Math.random()-.5)*18,Math.random()*14,(Math.random()-.5)*18),type:'debris'})}}
function whoosh(pos,power=.6){let s=new THREE.Mesh(new THREE.SphereGeometry(1.8*power,10,6),basic(0xa7bfd8,.22));s.position.copy(pos);scene.add(s);particles.push({mesh:s,life:.22,max:.22,type:'sphere'})}
function speedTrail(stage=2){
 let d=forward();let back=d.clone().multiplyScalar(-1);let side=right();
 // V52：2 阶使用原 3 阶红色火焰，3 阶改为天狼星式蓝白火焰。
 let cfg=stage===1?{len:4.5,rad:.22,alpha:.13,c1:0x9cc8ff,c2:0xd8edff,ring:.18,front:false}:{len:13,rad:.58,alpha:.28,c1:0xff3a16,c2:0xffb13a,ring:.65,front:true,frontColor:0xff5a1f};
 if(stage===3)cfg={len:15,rad:.62,alpha:.30,c1:0x52cfff,c2:0xf2fbff,ring:.78,front:true,frontColor:0x9eeeff};
 let base=player.pos.clone().add(new THREE.Vector3(0,1.08,0)).addScaledVector(back,stage===1?1.55:2.25);
 for(let i=0;i<2;i++){let offset=(i===0?-.34:.34)*(stage===1?.55:stage===3?1.05:1.05);let plume=new THREE.Mesh(new THREE.ConeGeometry(cfg.rad+Math.random()*.12,cfg.len+Math.random()*3,stage===1?12:16,1,true),basic(i===0?cfg.c1:cfg.c2,cfg.alpha));plume.position.copy(base).addScaledVector(side,offset).addScaledVector(back,cfg.len*.38+Math.random()*1.0);plume.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),back.clone().normalize());plume.scale.x=1.0+Math.random()*.22;plume.scale.z=.55+Math.random()*.20;scene.add(plume);particles.push({mesh:plume,life:stage===1?.20:.24,max:stage===1?.20:.24,type:'fade'});} 
 if(Math.random()<cfg.ring){let ring=new THREE.Mesh(new THREE.TorusGeometry((stage===1?.65:stage===3?1.25:1.05)+Math.random()*.45,.035,6,18),basic(stage===3?0xa9f4ff:(stage===2?0xff8a2a:0xb7d6ff),stage===1?.22:.32));ring.position.copy(base).addScaledVector(back,1.2+Math.random()*3.5);ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),d.clone().normalize());scene.add(ring);particles.push({mesh:ring,life:.18,max:.18,type:'ring'});} 
 if(cfg.front){let front=player.pos.clone().add(new THREE.Vector3(0,1.12,0)).addScaledVector(d,2.15+Math.random()*.35);let fire=new THREE.Mesh(new THREE.SphereGeometry(1.0+Math.random()*.45,12,8),basic(cfg.frontColor,stage===3?.26:.22));fire.position.copy(front);scene.add(fire);particles.push({mesh:fire,life:.12,max:.12,type:'sphere'});}
}
function sonicBoom(pos,stage){
 sfx('sonic');let d=forward();
 let color=stage===3?0x98f4ff:(stage===2?0xff8a2a:0xd8ecff);
 let ring=new THREE.Mesh(new THREE.TorusGeometry(stage===3?6.2:(stage===2?5.4:4.1),.08,8,36),basic(color,stage===1?.42:.50));
 ring.position.copy(pos).add(new THREE.Vector3(0,1.15,0)).addScaledVector(d,2.2);
 ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),d.clone().normalize());scene.add(ring);
 particles.push({mesh:ring,life:.46,max:.46,type:'ring'});
 whoosh(ring.position.clone(),stage===3?1.35:(stage===2?1.15:.85));
 addShake(stage===3?.62:(stage===2?.50:.38));
 show(stage===3?'第 3 阶段：天狼星蓝焰':'突破音速');
}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.life-=dt;
 if(p.vel){if(!p.space){p.vel.y-=(p.type==='blood'?18:25)*dt;}p.mesh.position.addScaledVector(p.vel,dt);p.mesh.rotation.x+=dt*(p.space?1.2:4);p.mesh.rotation.y+=dt*(p.space?1.0:3);if(!p.space&&p.mesh.position.y<.12){p.mesh.position.y=.12;p.vel.multiplyScalar(.35)}}
 let t=Math.max(0,p.life/p.max);if(p.fadeHold){let fadeWindow=Math.max(.8,p.max-p.fadeHold);let elapsed=p.max-p.life;t=elapsed<p.fadeHold?1:Math.max(0,p.life/fadeWindow);}if(p.mesh.material){p.mesh.material.opacity=t*.72;p.mesh.material.transparent=true}
 if(p.type==='ring'||p.type==='sphere')p.mesh.scale.multiplyScalar(1+dt*4.5);if(p.type==='spaceRing')p.mesh.scale.multiplyScalar(1+dt*.55);if(p.type==='saturnRing'){p.mesh.scale.x*=1+dt*.22;p.mesh.scale.y*=1+dt*.22;p.mesh.scale.z*=1+dt*.012;}if(p.type==='planetSphereShock')p.mesh.scale.multiplyScalar(1+dt*.22);if(p.type==='spaceSphere')p.mesh.scale.multiplyScalar(1+dt*.13);
 if(p.life<=0){removeObj(p.mesh);particles.splice(i,1)}}}
function updateCamera(dt){
 let f=forward(), rt=right();let look=player.pos.clone().add(new THREE.Vector3(0,1.35,0));let dist=keys.ShiftLeft||keys.ShiftRight?13.2:8.8;if(spaceMode)dist=17;let shoulder=keys.ShiftLeft||keys.ShiftRight?2.55:2.85;let height=keys.ShiftLeft||keys.ShiftRight?1.45:2.15;let desired=look.clone().addScaledVector(f,-dist).addScaledVector(rt,shoulder).add(new THREE.Vector3(0,height,0));camera.position.lerp(desired,Math.min(1,dt*12));
 let lookAtPoint=look.clone().addScaledVector(f,15).addScaledVector(rt,.75);
 let sprinting=keys.ShiftLeft||keys.ShiftRight;let micro=sprinting?0.045:0;
 if(shake>0||micro>0){let s=Math.min(1.35,shake)+micro;camera.position.addScaledVector(rt,(Math.random()-.5)*s*3.1);camera.position.y+=(Math.random()-.5)*s*2.15;camera.position.addScaledVector(f,(Math.random()-.5)*s*.75);camera.rotation.z+=(Math.random()-.5)*s*.018;shake=Math.max(0,shake-dt*1.65);if(shake<.01)shake=0}
 camera.lookAt(lookAtPoint);
}
function updateUI(dt){hpEl.style.width=Math.max(0,player.hp)+'%';player.stamina=100;staEl.style.width='100%';damageFlash=Math.max(0,damageFlash-dt*1.9);if(damageFlashEl){damageFlashEl.classList.toggle('on',damageFlash>0);damageFlashEl.style.opacity=String(Math.min(1,damageFlash*2.4));}let live=enemies.filter(e=>!e.dead).length;if(enemyInfoEl)enemyInfoEl.innerHTML='<span>'+L('defeated')+'</span><b>'+kills+' / '+totalEnemies+'</b>';if(remainInfoEl)remainInfoEl.innerHTML='<span>'+L('remaining')+'</span><b>'+live+'</b>';if(casualtyInfoEl)casualtyInfoEl.innerHTML='<span>'+L('buildingCasualties')+'</span><b>'+ppl(buildingCasualties)+'</b>';if(civilianDeathInfoEl)civilianDeathInfoEl.innerHTML='<span>'+L('civilianDeaths')+'</span><b>'+ppl(civilianDeaths)+'</b>';if(innocentInfoEl)innocentInfoEl.innerHTML='<span>'+L('innocent')+'</span><b>'+ppl(innocentKills)+'</b>';if(protestInfoEl)protestInfoEl.innerHTML='<span>'+L('protesters')+'</span><b>'+(protestersSpawned?ppl(protesters.filter(p=>!p.dead).length):L('notAppeared'))+'</b>';if(heightInfoEl)heightInfoEl.innerHTML='<span>'+L('height')+'</span><b>'+Math.round(player.pos.y)+' '+(spaceMode?L('spaceName'):L('city'))+'</b>';infoEl.innerHTML='<span>'+L('objective')+'</span><b>'+L('mission')+'</b>';lockEl.innerHTML='<span>'+L('lock')+'</span><b>'+(locked?targetName(locked):L('none'))+'</b>';cross.classList.toggle('lock',!!locked);if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0)msg.textContent=''}}function show(t){msg.textContent=localizeMessage(t);msgTimer=1.25}
function finish(win){gameOver=true;started=false;overlay.style.display='flex';let live=enemies.filter(e=>!e.dead).length;let cleanHero=win&&innocentKills===0&&civilianDeaths===0&&buildingCasualties===0;let title=cleanHero?'好人结局':(win?'任务完成':'你死了！');let reason=cleanHero?'你只击败了坏人，没有伤及无辜。':(win?'所有敌人已被击败。':(deathReason||'菜就多练'));overlay.innerHTML=`<div class=\"deathCard\"><h1>${title}</h1><div class=\"deathReason\">${reason}</div><div class=\"deathStats\"><div>击败敌人：<b>${kills} / ${totalEnemies}</b></div><div>剩余敌人：<b>${live}</b></div><div>大楼伤亡：<b>${buildingCasualties} 人</b></div><div>害死路人：<b>${civilianDeaths} 人</b></div><div>误伤路人：<b>${innocentKills} / 3</b></div></div><div class=\"sub\">V53：太阳系扩展、全行星可摧毁、银河背景。</div><button onclick=\"location.reload()\">重新开始</button></div>`}
function mobile(){let jb=document.getElementById('joyBase'),js=document.getElementById('joyStick'),active=false;function setJoy(x,y){let r=jb.getBoundingClientRect(),cx=r.left+60,cy=r.top+60,dx=x-cx,dy=y-cy,len=Math.hypot(dx,dy)||1,m=Math.min(42,len);dx=dx/len*m;dy=dy/len*m;js.style.left=35+dx+'px';js.style.top=35+dy+'px';keys.KeyW=dy<-12;keys.KeyS=dy>12;keys.KeyA=dx<-12;keys.KeyD=dx>12}jb.addEventListener('touchstart',e=>{active=true;setJoy(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});jb.addEventListener('touchmove',e=>{if(active)setJoy(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});jb.addEventListener('touchend',()=>{active=false;js.style.left='35px';js.style.top='35px';keys.KeyW=keys.KeyS=keys.KeyA=keys.KeyD=false});hold('btnFly','Space');hold('btnDash','ShiftLeft');document.getElementById('btnPunch').ontouchstart=e=>{punch(false);e.preventDefault()};document.getElementById('btnHeavy').ontouchstart=e=>{punch(true);e.preventDefault()};let lx=0,ly=0,look=false;addEventListener('touchstart',e=>{if(e.touches.length===1&&e.touches[0].clientX>innerWidth*.35){look=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}},{passive:false});addEventListener('touchmove',e=>{if(look&&e.touches.length===1){let t=e.touches[0];yaw-=(t.clientX-lx)*.0038;pitch-=(t.clientY-ly)*.0034;pitch=Math.max(-1.57065,Math.min(1.57065,pitch));lx=t.clientX;ly=t.clientY}},{passive:false});addEventListener('touchend',()=>look=false)}function hold(id,code){let el=document.getElementById(id);el.addEventListener('touchstart',e=>{keys[code]=true;e.preventDefault()},{passive:false});el.addEventListener('touchend',()=>keys[code]=false)}
function animate(){requestAnimationFrame(animate);let dt=Math.min(.033,clock.getDelta());if(started&&!gameOver){autoLock();updatePlayer(dt);updateTrigg(dt);updateEnemies(dt);updatePeople(dt);updateDestroyerEnding(dt);updateCamera(dt);updateUI(dt)}updateParticles(dt);renderer.render(scene,camera)}try{init();}catch(err){console.error(err);if(overlay){overlay.style.display='flex';overlay.innerHTML='<div class=\"deathCard errorScreen\"><div class=\"deathKicker\">BOOT ERROR</div><h1>启动失败</h1><div class=\"deathReason\">脚本初始化出错：'+(err&&err.message?err.message:err)+'</div><button onclick=\"location.reload()\">重新加载</button></div>';}}})();

</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#05070a;color:#e8edf2;font-family:Arial,'Microsoft YaHei',sans-serif;touch-action:none}
canvas{display:block}
#ui{position:fixed;inset:0;z-index:5;pointer-events:none}
.hudCluster{position:absolute;top:16px;left:16px;display:flex;flex-direction:column;gap:10px;max-width:min(430px,calc(100vw - 32px))}
.hudRow{display:flex;gap:8px;flex-wrap:wrap}
.hudCard{min-width:132px;padding:9px 11px;background:linear-gradient(135deg,rgba(8,12,18,.72),rgba(20,24,29,.50));border-left:3px solid rgba(255,213,97,.75);box-shadow:0 10px 28px rgba(0,0,0,.35);backdrop-filter:blur(2px);text-shadow:0 1px 2px #000}
.hudCard span{display:block;font-size:11px;color:#9daab8;letter-spacing:.06em;text-transform:uppercase}
.hudCard b{font-size:15px;color:#f1f4f7;font-weight:700}
#statsPanel{width:280px;padding:11px;background:linear-gradient(135deg,rgba(8,12,18,.78),rgba(20,24,29,.55));border-top:1px solid rgba(255,255,255,.12);box-shadow:0 10px 30px rgba(0,0,0,.38)}
.label{font-size:12px;color:#c9d3dc;margin-bottom:4px}
.barWrap{width:100%;height:12px;background:#12171c;border:1px solid rgba(255,255,255,.18);overflow:hidden;margin-bottom:8px}
.bar{height:100%;width:100%;background:linear-gradient(90deg,#9a1d23,#f14a35)}
.stamina{background:linear-gradient(90deg,#265b92,#7cc3ff)}
#centerMsg{position:absolute;left:50%;top:17%;transform:translateX(-50%);font-size:22px;font-weight:800;text-align:center;color:#ffdf8a;text-shadow:0 3px 16px #000,0 0 18px rgba(255,199,82,.35);letter-spacing:.04em}
#cross{position:absolute;left:50%;top:50%;width:22px;height:22px;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.65);border-radius:50%;box-shadow:0 0 14px rgba(255,255,255,.20)}
#cross:before,#cross:after{content:"";position:absolute;background:rgba(255,255,255,.65)}
#cross:before{left:10px;top:-13px;width:1px;height:48px}#cross:after{top:10px;left:-13px;width:48px;height:1px}
#cross.lock{border-color:#ffd866;box-shadow:0 0 22px rgba(255,211,86,.9)}#cross.lock:before,#cross.lock:after{background:#ffd866}
#damageFlash{position:absolute;inset:0;pointer-events:none;opacity:0;box-shadow:inset 0 0 90px 24px rgba(210,0,0,.58)}#damageFlash.on{opacity:1}
#overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:stretch;justify-content:stretch;pointer-events:auto;color:#edf3fa;background:#05070a;overflow:hidden}
#overlay:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 68% 38%,rgba(255,210,80,.18),transparent 22%),radial-gradient(circle at 30% 65%,rgba(54,111,200,.22),transparent 30%),linear-gradient(115deg,#05070a 0%,#0d1520 42%,#1a1610 100%);}
#overlay:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.82),rgba(0,0,0,.32) 48%,rgba(0,0,0,.72)),repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 4px);mix-blend-mode:screen;opacity:.8;}
.menuScreen{position:relative;z-index:1;width:100%;min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:clamp(28px,6vw,84px)}
.menuKicker,.deathKicker{font-size:13px;letter-spacing:.32em;color:#ffd465;text-transform:uppercase;margin-bottom:14px;text-shadow:0 0 16px rgba(255,200,72,.45)}
.menuTitle{font-size:clamp(46px,8vw,112px);line-height:.9;font-weight:900;letter-spacing:.02em;color:#fff;text-shadow:0 8px 0 rgba(0,0,0,.55),0 0 35px rgba(255,213,100,.22)}
.menuSubtitle{font-size:clamp(17px,2.2vw,28px);margin-top:18px;color:#c7d4e2;max-width:920px;text-shadow:0 2px 12px #000}
.menuMeta{display:flex;gap:12px;flex-wrap:wrap;margin:26px 0 34px;max-width:1000px}
.menuMeta span{padding:9px 13px;background:rgba(255,255,255,.06);border-left:3px solid rgba(255,215,96,.82);box-shadow:0 8px 24px rgba(0,0,0,.24);color:#dce6f0;font-size:13px}
button{pointer-events:auto;appearance:none;border:0;cursor:pointer;color:#071016;background:linear-gradient(90deg,#ffd45f,#ff8b36);font-size:18px;font-weight:900;letter-spacing:.08em;padding:15px 28px;box-shadow:0 12px 30px rgba(255,157,55,.25),0 4px 0 rgba(83,41,0,.8);border-radius:2px;align-self:flex-start}
button:hover{filter:brightness(1.08);transform:translateY(-1px)}
.menuFooter{position:absolute;left:clamp(28px,6vw,84px);bottom:28px;color:#7d8a98;font-size:12px;letter-spacing:.08em}
.deathCard{position:relative;z-index:1;inset:0;width:100%;min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:clamp(30px,7vw,90px);background:linear-gradient(105deg,rgba(0,0,0,.92),rgba(32,10,10,.56),rgba(0,0,0,.92))}
.deathCard h1{font-size:clamp(48px,8vw,112px);line-height:.9;color:#fff;text-shadow:0 7px 0 #000,0 0 32px rgba(255,40,28,.28)}
.deathReason{font-size:clamp(20px,3vw,38px);font-weight:800;color:#ffcf66;margin:20px 0 18px;max-width:1050px;text-shadow:0 2px 12px #000}
.deathStats{font-size:16px;color:#d6e0ea;line-height:1.75;margin:8px 0 30px;max-width:560px}
.deathStats p{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.10);padding:5px 0}
.deathStats b{color:#fff}
.errorScreen .deathReason{color:#ff8b8b}

.langSwitch{position:absolute;right:clamp(18px,4vw,54px);top:clamp(16px,3vw,34px);z-index:3;display:flex;gap:8px;background:rgba(0,0,0,.34);padding:7px;border:1px solid rgba(255,255,255,.13);box-shadow:0 10px 28px rgba(0,0,0,.32);backdrop-filter:blur(3px)}

#mobile{display:none;position:absolute;inset:0;pointer-events:none}.touchBtn{position:absolute;width:68px;height:68px;border-radius:50%;background:rgba(30,35,40,.58);border:1px solid rgba(255,255,255,.24);pointer-events:auto;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;text-shadow:0 1px 2px #000;user-select:none}#joyBase{position:absolute;left:30px;bottom:32px;width:120px;height:120px;border-radius:50%;background:rgba(30,35,40,.42);border:1px solid rgba(255,255,255,.18);pointer-events:auto}#joyStick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:rgba(210,220,230,.35);border:1px solid rgba(255,255,255,.25)}#btnFly{right:116px;bottom:36px}#btnPunch{right:34px;bottom:118px}#btnDash{right:34px;bottom:36px}#btnHeavy{right:116px;bottom:118px}
@media(max-width:900px){#mobile{display:block}.hudCluster{top:10px;left:10px}#statsPanel{width:220px}.hudCard{min-width:112px;padding:7px 9px}.menuMeta{display:none}.menuFooter{display:none}}
</style>

function playTone(freq=120,dur=.08,type='sine',gain=.055,filterFreq=650){
 if(!audioCtx)return;
 const now=audioCtx.currentTime;
 const osc=audioCtx.createOscillator();
 const filter=audioCtx.createBiquadFilter();
 const g=audioCtx.createGain();
 osc.type=type;
 filter.type='lowpass';
 filter.frequency.setValueAtTime(filterFreq,now);
 osc.frequency.setValueAtTime(freq,now);
 osc.frequency.exponentialRampToValueAtTime(Math.max(24,freq*.38),now+dur);
 g.gain.setValueAtTime(Math.min(.72,gain*SFX_MASTER),now);
 g.gain.exponentialRampToValueAtTime(.001,now+dur);
 osc.connect(filter);filter.connect(g);g.connect(audioCtx.destination);
 osc.start(now);osc.stop(now+dur+.025);
}
let sfxLast={};
function sfx(kind,power=1){
 if(!audioCtx)return;
 const now=audioCtx.currentTime;
 const gap={punch:.055,heavy:.09,boom:.12,collapse:.45,hurt:.12,sonic:.55,burn:.16,whoosh:.08,win:.1}[kind]||.08;
 if(sfxLast[kind] && now-sfxLast[kind]<gap)return;
 sfxLast[kind]=now;
 // 柔化后的 V15 风格合成音：不再使用刺耳的电流感方波/锯齿叠加。
 if(kind==='punch'){
  playTone(150,.075,'triangle',.060*power,720);playTone(70,.10,'sine',.030*power,360);
 }else if(kind==='heavy'){
  playTone(96,.14,'triangle',.085*power,520);setTimeout(()=>playTone(48,.15,'sine',.050*power,310),28);
 }else if(kind==='boom'){
  playTone(58,.22,'triangle',.075*power,430);setTimeout(()=>playTone(34,.26,'sine',.055*power,260),30);
 }else if(kind==='collapse'){
  playTone(46,.30,'triangle',.090*power,360);setTimeout(()=>playTone(30,.42,'sine',.070*power,240),55);setTimeout(()=>playTone(72,.10,'triangle',.030*power,500),120);
 }else if(kind==='hurt'){
  playTone(180,.13,'triangle',.065*power,650);playTone(82,.12,'sine',.035*power,300);
 }else if(kind==='sonic'){
  playTone(520,.08,'sine',.060*power,900);setTimeout(()=>playTone(76,.22,'triangle',.080*power,360),35);
 }else if(kind==='burn'){
  playTone(88,.12,'triangle',.035*power,360);playTone(155,.08,'sine',.018*power,500);
 }else if(kind==='whoosh'){
  playTone(250,.09,'triangle',.035*power,760);playTone(120,.12,'sine',.020*power,400);
 }else if(kind==='win'){
  playTone(330,.12,'triangle',.055*power,720);setTimeout(()=>playTone(520,.18,'triangle',.055*power,900),120);
 }else{
  playTone(110,.10,'sine',.040*power,400);
 }
}

function forward(){let cp=Math.cos(pitch);return new THREE.Vector3(-Math.sin(yaw)*cp,Math.sin(pitch),-Math.cos(yaw)*cp).normalize()}
function flatForward(){return new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)).normalize()}
function right(){return new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw)).normalize()}
function targetFacePoint(t){return t.pos.clone().add(new THREE.Vector3(0,1.72,0));}
function stickyApproachDir(source,face){
 let dir=face.clone().sub(source);
 if(dir.lengthSq()<.001)dir=forward();
 dir.normalize();
 // 防止从头顶垂直吸附：把贴脸方向压成斜上前方。
 dir.y=THREE.MathUtils.clamp(dir.y,-.20,.32);
 if(Math.abs(dir.x)+Math.abs(dir.z)<.08){let f=flatForward();dir.x=f.x;dir.z=f.z;}
 return dir.normalize();
}
function stickyHoldPoint(t,source){let face=targetFacePoint(t);let dir=stickyApproachDir(source,face);return face.clone().addScaledVector(dir,-2.35).add(new THREE.Vector3(0,.42,0));}
function updatePlayerBurnTint(dt){if(triggDefeated)sunRed=Math.max(0,sunRed-dt*.9);

 if(!player.mesh)return;
 const red=new THREE.Color(0xff3518);
 player.mesh.traverse(o=>{if(o.material&&o.material.color){if(!o.userData.baseColor)o.userData.baseColor=o.material.color.clone();o.material.color.copy(o.userData.baseColor).lerp(red,Math.min(.82,sunRed));}});
}
function maintainStickyTarget(dt){
 let t=player.stickyTarget;
 if(!targetAlive(t)){player.stickyTarget=null;player.stickyHold=0;return;}
 let source=player.pos.clone().add(new THREE.Vector3(0,1.15,0));
 let face=targetFacePoint(t);
 if(!hasLineOfSight(source,face)){player.stickyTarget=null;player.stickyHold=0;locked=null;return;}
 let hold=stickyHoldPoint(t,source);
 let correction=hold.sub(player.pos);
 if(player.stickyHold>0 || correction.length()<7.5){
   player.vel.addScaledVector(correction,Math.min(58,correction.length()*15));
   player.vel.multiplyScalar(.68);
   player.stickyHold=Math.max(player.stickyHold,.12);
 }else if(player.attackDash>0){
   let dir=stickyApproachDir(source,face);
   player.vel.lerp(dir.multiplyScalar(250),Math.min(1,dt*10));
 }
 player.stickyHold=Math.max(0,(player.stickyHold||0)-dt);
}

function updatePlayerPose(dt,sprint){let p=player.parts;if(!p)return;

 }

 let swing=Math.sin(time*5.0)*.018;
 let flightShake=airborne&&!sprint?Math.sin(time*7.2)*.018:0;

 trigg.mesh.position.copy(trigg.pos);trigg.mesh.lookAt(player.pos.clone().add(new THREE.Vector3(0,1.2,0)));if(trigg.hp<=0)killTrigg();}
function killTrigg(){if(!trigg||trigg.dead)return;trigg.dead=true;triggDefeated=true;triggChallenged=false;removeObj(trigg.mesh);bloodBurst(trigg.pos,0xaa1111);impact(trigg.pos.clone(),2.0);addShake(.34);sfx('win');show('崔格被击败：太阳灼烧已失效，无法返回地球');spaceMode=true;if(cityGroup)cityGroup.visible=false;if(spaceGroup)spaceGroup.visible=true;}
function segmentHitsBox(a,b,box,extra=1.2){
 let u=box.userData,bp=box.position;
 let minX=bp.x-(u.w||4)/2-extra,maxX=bp.x+(u.w||4)/2+extra;
 let minY=-1,maxY=bp.y+(u.h||2)/2+1;
 // 部分建筑 position.y=h/2，车辆/废墟也适配一下
 if(u.type==='building')maxY=(u.h||2)+1;
 let minZ=bp.z-(u.d||3)/2-extra,maxZ=bp.z+(u.d||3)/2+extra;
 let dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z;
 let tmin=0,tmax=1;
 function slab(p,d,min,max){
   if(Math.abs(d)<1e-6)return (p>=min&&p<=max)?[0,1]:null;
   let t1=(min-p)/d,t2=(max-p)/d;if(t1>t2){let q=t1;t1=t2;t2=q;}return [t1,t2];
 }
 for(let s of [slab(a.x,dx,minX,maxX),slab(a.y,dy,minY,maxY),slab(a.z,dz,minZ,maxZ)]){
   if(!s)return false;tmin=Math.max(tmin,s[0]);tmax=Math.min(tmax,s[1]);if(tmin>tmax)return false;
 }
 return tmax>=0&&tmin<=1&&tmax>.015;
}
function hasLineOfSight(a,b){
 // 只让完整建筑挡锁定；被摧毁/车辆/废墟不挡，避免误判。
 for(let box of buildings){let u=box.userData;if(!u||u.destroyed||u.type!=='building')continue;if(segmentHitsBox(a,b,box,.45))return false;}
 return true;
}

function blockAttackDashThroughWalls(from,to){
 if((player.attackDash||0)<=0)return;
 for(let b of buildings){let u=b.userData;if(u.destroyed||u.type!=='building')continue;
  if(segmentHitsBox(from,to,b,1.25)){
   player.pos.copy(from);
   player.vel.multiplyScalar(.08);
   player.attackDash=0; locked=null;
   impact(from.clone().add(new THREE.Vector3(0,1,0)),.55);addShake(.10);show('攻击被建筑挡住');
   return;
  }
 }
}
function sweptBuildingCollision(from,to,speed,sprinting){
 if(!sprinting||speed<38)return;
 for(let b of buildings){let u=b.userData;if(u.destroyed||u.type!=='building')continue;
  if(segmentHitsBox(from,to,b,2.4)){let dmg=260+speed*5.6;u.hp-=dmg;if(!u.cracked){u.cracked=true;addCrack(b)}impact(to.clone(),Math.min(2.4,.85+speed/160));addShake(Math.min(.95,.42+speed/330));sfx('boom');
   if(u.hp<=0||speed>90)collapse(b); // 高速超人冲撞：命中普通楼必定塌
  }
 }
}
function checkBuildingCollision(obj,isPlayer){let p=obj.pos;for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let bp=b.position;let hw=(u.w||4)/2+1,hd=(u.d||3)/2+1,h=u.h||2;if(Math.abs(p.x-bp.x)<hw&&Math.abs(p.z-bp.z)<hd&&p.y<h+1){let speed=obj.vel.length(),sprinting=isPlayer&&(keys.ShiftLeft||keys.ShiftRight)&&speed>22;let normalFlightHit=isPlayer&&!sprinting&&player.mode==='flight'&&speed>18;if(speed>9){let dmg;if(normalFlightHit){let now=performance.now()/1000;if(now-(u.lastNormalHit||-999)>.36){u.normalHits=(u.normalHits||0)+1;u.lastNormalHit=now;show('普通飞行撞击 '+Math.min(3,u.normalHits)+'/3');impact(p.clone(),Math.min(1.45,.65+speed/105));addShake(Math.min(.14,.045+speed/1300));}dmg=Math.max(28,(u.max||u.hp||180)*.29);u.hp=Math.min(u.hp,u.max||u.hp)-dmg;if(!u.cracked){u.cracked=true;addCrack(b)}if((u.normalHits||0)>=3||u.hp<=0)collapse(b);}else{dmg=speed*(isPlayer?(sprinting?7.8:1.05):1.35);u.hp-=dmg;if(!isPlayer&&obj.hp!==undefined)obj.hp-=speed*.12;if(!u.cracked){u.cracked=true;addCrack(b)}impact(p.clone(),Math.min(2.0,speed/48));addShake(Math.min(.18,.055+speed/850));if(u.hp<=0||(isPlayer&&sprinting&&speed>80))collapse(b);}}if(isPlayer&&sprinting){continue}let away=p.clone().sub(bp);away.y=0;if(away.lengthSq()<.001)away.set(1,0,0);away.normalize();p.addScaledVector(away,isPlayer?.08:1.2);obj.vel.reflect(away).multiplyScalar(isPlayer?.20:.24)}}}
function damageCone(pos,dir,amount,rad){for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let to=b.position.clone().sub(pos);let d=to.length();if(d<rad+Math.max(u.w||2,u.d||2)*.35&&to.normalize().dot(dir)>.35){u.hp-=amount*1.8;if(!u.cracked){u.cracked=true;addCrack(b)}if(u.hp<=0)collapse(b)}}for(let e of enemies){if(e.dead)continue;let to=e.pos.clone().add(new THREE.Vector3(0,1,0)).sub(pos);if(to.length()<rad+2&&to.normalize().dot(dir)>.25)hitEnemy(e,dir,amount>25)}damagePeople(pos,dir,amount,rad);}
function damageNearbyBuilding(pos,amount){let best=null,bd=9;for(let b of buildings){let u=b.userData;if(u.destroyed)continue;let d=Math.hypot(pos.x-b.position.x,pos.z-b.position.z);if(d<bd){bd=d;best=b}}if(best){best.userData.hp-=amount;if(!best.userData.cracked){best.userData.cracked=true;addCrack(best)}if(best.userData.hp<=0)collapse(best)}}
function addCrack(b){let u=b.userData;if(u.type==='car')return;let c=new THREE.Mesh(new THREE.PlaneGeometry(4+Math.random()*3,4+Math.random()*3),basic(0x090909,.62));c.position.set(b.position.x,Math.min(u.h-1,3+Math.random()*u.h*.45),b.position.z+u.d/2+.05);cityAdd(c);u.decor.push(c)}
function collapse(b){let u=b.userData;if(u.destroyed)return;sfx('collapse',1.0);u.destroyed=true;for(let d of u.decor||[])removeObj(d);removeObj(b);let count=u.type==='building'?Math.min(18,7+Math.floor((u.h||10)/5)):6;for(let i=0;i<count;i++){let sz=u.type==='building'?.9+Math.random()*1.8:.5+Math.random();let c=new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),mat(u.type==='building'?0x746d64:0x30353a));c.position.set(b.position.x+(Math.random()-.5)*(u.w||5),1+Math.random()*Math.min(u.h||4,18),b.position.z+(Math.random()-.5)*(u.d||5));cityAdd(c);particles.push({mesh:c,life:1.5+Math.random()*.8,max:2.3,vel:new THREE.Vector3((Math.random()-.5)*18,Math.random()*15,(Math.random()-.5)*18),type:'debris'});}let stump=new THREE.Mesh(new THREE.BoxGeometry(u.w||4,Math.max(.35,(u.h||2)*.08),u.d||4),mat(0x2e3030));stump.position.set(b.position.x,Math.max(.22,(u.h||2)*.04),b.position.z);cityAdd(stump);impact(b.position.clone(),2.05);addShake(u.type==='building'?.95:.55);if(u.type==='building'){let dead=100+Math.floor(Math.random()*301);buildingCasualties+=dead;show('你害死了 '+dead+' 人');if(buildingCasualties>2500)spawnProtesters()}else show('车辆被砸烂！')}
function kill(e){e.dead=true;removeObj(e.mesh);kills++;bloodBurst(e.pos,0x8d0f0f);if(locked===e)locked=null;if(player.stickyTarget===e)player.stickyTarget=null;impact(e.pos.clone().add(new THREE.Vector3(0,1,0)),1.1);show(e.boss?'Boss 击败':'敌人击败')}
function playerDamage(a,dir){if(player.hitCd>0)return;sfx('hurt');player.hitCd=.42;player.hp-=a;damageFlash=.38;player.vel.addScaledVector(dir,-13);addShake(.52);impact(player.pos.clone(),.55);if(player.hp<=0){deathReason='菜就多练';finish(false)}}
function impact(pos,power=1){let ring=new THREE.Mesh(new THREE.RingGeometry(.7*power,2.7*power,22),basic(0xc7bcae,.45));ring.position.copy(pos);ring.rotation.x=-Math.PI/2;scene.add(ring);particles.push({mesh:ring,life:.34,max:.34,type:'ring'});let n=Math.min(12,Math.floor(5+power*5));for(let i=0;i<n;i++){let m=new THREE.Mesh(new THREE.BoxGeometry(.22,.22,.22),mat(0x81786e));m.position.copy(pos);scene.add(m);particles.push({mesh:m,life:.75+Math.random()*.35,max:1.1,vel:new THREE.Vector3((Math.random()-.5)*18,Math.random()*14,(Math.random()-.5)*18),type:'debris'})}}
function whoosh(pos,power=.6){let s=new THREE.Mesh(new THREE.SphereGeometry(1.8*power,10,6),basic(0xa7bfd8,.22));s.position.copy(pos);scene.add(s);particles.push({mesh:s,life:.22,max:.22,type:'sphere'})}
function speedTrail(stage=2){let d=forward();let back=d.clone().multiplyScalar(-1);let side=right();let cfg=stage===1?{len:4.5,rad:.22,alpha:.13,c1:0x9cc8ff,c2:0xd8edff,ring:.18}:{len:8.5,rad:.44,alpha:.20,c1:0x9cc8ff,c2:0xd8edff,ring:.45};
 if(stage===3)cfg={len:13,rad:.58,alpha:.28,c1:0xff3a16,c2:0xffb13a,ring:.65};
 let base=player.pos.clone().add(new THREE.Vector3(0,1.08,0)).addScaledVector(back,stage===1?1.55:2.25);
 for(let i=0;i<2;i++){let offset=(i===0?-.34:.34)*(stage===1?.55:stage===3?1.05:.82);let plume=new THREE.Mesh(new THREE.ConeGeometry(cfg.rad+Math.random()*.12,cfg.len+Math.random()*3,stage===3?16:12,1,true),basic(i===0?cfg.c1:cfg.c2,cfg.alpha));plume.position.copy(base).addScaledVector(side,offset).addScaledVector(back,cfg.len*.38+Math.random()*1.0);plume.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),back.clone().normalize());plume.scale.x=1.0+Math.random()*.22;plume.scale.z=.55+Math.random()*.20;scene.add(plume);particles.push({mesh:plume,life:stage===3?.24:.20,max:stage===3?.24:.20,type:'fade'});} 
 if(Math.random()<cfg.ring){let ring=new THREE.Mesh(new THREE.TorusGeometry((stage===1?.65:1.05)+Math.random()*.45,.035,6,18),basic(stage===3?0xff8a2a:0xb7d6ff,stage===3?.30:.22));ring.position.copy(base).addScaledVector(back,1.2+Math.random()*3.5);ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),d.clone().normalize());scene.add(ring);particles.push({mesh:ring,life:.18,max:.18,type:'ring'});} 
 if(stage===3){let front=player.pos.clone().add(new THREE.Vector3(0,1.12,0)).addScaledVector(d,2.15+Math.random()*.35);let fire=new THREE.Mesh(new THREE.SphereGeometry(1.0+Math.random()*.45,12,8),basic(0xff5a1f,.22));fire.position.copy(front);scene.add(fire);particles.push({mesh:fire,life:.12,max:.12,type:'sphere'});}
}
function sonicBoom(pos,stage){sfx('sonic');let d=forward();let ring=new THREE.Mesh(new THREE.TorusGeometry(stage===3?5.6:4.1,.08,8,36),basic(stage===3?0xffb15a:0xd8ecff,.42));ring.position.copy(pos).add(new THREE.Vector3(0,1.15,0)).addScaledVector(d,2.2);ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),d.clone().normalize());scene.add(ring);particles.push({mesh:ring,life:.38,max:.38,type:'ring'});whoosh(ring.position.clone(),stage===3?1.25:.85);addShake(stage===3?.55:.38);show(stage===3?'第 3 阶段：燃烧冲刺':'突破音速');}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.life-=dt;
 if(p.vel){if(!p.space){p.vel.y-=(p.type==='blood'?18:25)*dt;}p.mesh.position.addScaledVector(p.vel,dt);p.mesh.rotation.x+=dt*(p.space?1.2:4);p.mesh.rotation.y+=dt*(p.space?1.0:3);if(!p.space&&p.mesh.position.y<.12){p.mesh.position.y=.12;p.vel.multiplyScalar(.35)}}
 let t=Math.max(0,p.life/p.max);if(p.fadeHold){let fadeWindow=Math.max(.8,p.max-p.fadeHold);let elapsed=p.max-p.life;t=elapsed<p.fadeHold?1:Math.max(0,p.life/fadeWindow);}if(p.mesh.material){p.mesh.material.opacity=t*.72;p.mesh.material.transparent=true}
 if(p.type==='ring'||p.type==='sphere')p.mesh.scale.multiplyScalar(1+dt*4.5);if(p.type==='spaceRing')p.mesh.scale.multiplyScalar(1+dt*.55);if(p.type==='saturnRing'){p.mesh.scale.x*=1+dt*.38;p.mesh.scale.y*=1+dt*.38;p.mesh.scale.z*=1+dt*.02;}if(p.type==='spaceSphere')p.mesh.scale.multiplyScalar(1+dt*.20);
 if(p.life<=0){removeObj(p.mesh);particles.splice(i,1)}}}
function updateCamera(dt){
 let f=forward(), rt=right();let look=player.pos.clone().add(new THREE.Vector3(0,1.35,0));let dist=keys.ShiftLeft||keys.ShiftRight?13.2:8.8;if(spaceMode)dist=17;let shoulder=keys.ShiftLeft||keys.ShiftRight?2.55:2.85;let height=keys.ShiftLeft||keys.ShiftRight?1.45:2.15;let desired=look.clone().addScaledVector(f,-dist).addScaledVector(rt,shoulder).add(new THREE.Vector3(0,height,0));camera.position.lerp(desired,Math.min(1,dt*12));
 let lookAtPoint=look.clone().addScaledVector(f,15).addScaledVector(rt,.75);
 let sprinting=keys.ShiftLeft||keys.ShiftRight;let micro=sprinting?0.045:0;
 if(shake>0||micro>0){let s=Math.min(1.35,shake)+micro;camera.position.addScaledVector(rt,(Math.random()-.5)*s*3.1);camera.position.y+=(Math.random()-.5)*s*2.15;camera.position.addScaledVector(f,(Math.random()-.5)*s*.75);camera.rotation.z+=(Math.random()-.5)*s*.018;shake=Math.max(0,shake-dt*1.65);if(shake<.01)shake=0}
 camera.lookAt(lookAtPoint);
}
function updateUI(dt){hpEl.style.width=Math.max(0,player.hp)+'%';player.stamina=100;staEl.style.width='100%';damageFlash=Math.max(0,damageFlash-dt*1.9);if(damageFlashEl){damageFlashEl.classList.toggle('on',damageFlash>0);damageFlashEl.style.opacity=String(Math.min(1,damageFlash*2.4));}let live=enemies.filter(e=>!e.dead).length;if(enemyInfoEl)enemyInfoEl.innerHTML='<span>'+L('defeated')+'</span><b>'+kills+' / '+totalEnemies+'</b>';if(remainInfoEl)remainInfoEl.innerHTML='<span>'+L('remaining')+'</span><b>'+live+'</b>';if(casualtyInfoEl)casualtyInfoEl.innerHTML='<span>'+L('buildingCasualties')+'</span><b>'+ppl(buildingCasualties)+'</b>';if(civilianDeathInfoEl)civilianDeathInfoEl.innerHTML='<span>'+L('civilianDeaths')+'</span><b>'+ppl(civilianDeaths)+'</b>';if(innocentInfoEl)innocentInfoEl.innerHTML='<span>'+L('innocent')+'</span><b>'+innocentKills+' / 3</b>';if(protestInfoEl)protestInfoEl.innerHTML='<span>'+L('protesters')+'</span><b>'+(protestersSpawned?ppl(protesters.filter(p=>!p.dead).length):L('notAppeared'))+'</b>';if(heightInfoEl)heightInfoEl.innerHTML='<span>'+L('height')+'</span><b>'+Math.round(player.pos.y)+' '+(spaceMode?L('spaceName'):L('city'))+'</b>';infoEl.innerHTML='<span>'+L('objective')+'</span><b>'+L('mission')+'</b>';lockEl.innerHTML='<span>'+L('lock')+'</span><b>'+(locked?targetName(locked):L('none'))+'</b>';cross.classList.toggle('lock',!!locked);if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0)msg.textContent=''}}function show(t){msg.textContent=localizeMessage(t);msgTimer=1.25}
function finish(win){gameOver=true;started=false;overlay.style.display='flex';let live=enemies.filter(e=>!e.dead).length;let cleanHero=win&&innocentKills===0&&civilianDeaths===0&&buildingCasualties===0;let title=cleanHero?'好人结局':(win?'任务完成':'你死了！');let reason=cleanHero?'你只击败了坏人，没有伤及无辜。':(win?'所有敌人已被击败。':(deathReason||'菜就多练'));overlay.innerHTML=`<div class=\"deathCard\"><h1>${title}</h1><div class=\"deathReason\">${reason}</div><div class=\"deathStats\"><div>击败敌人：<b>${kills} / ${totalEnemies}</b></div><div>剩余敌人：<b>${live}</b></div><div>大楼伤亡：<b>${buildingCasualties} 人</b></div><div>害死路人：<b>${civilianDeaths} 人</b></div><div>误伤路人：<b>${innocentKills} / 3</b></div></div><div class=\"sub\">V41：土星环式行星冲击波、四肢随身体倾斜、星球碎片长留。</div><button onclick=\"location.reload()\">重新开始</button></div>`}
function mobile(){let jb=document.getElementById('joyBase'),js=document.getElementById('joyStick'),active=false;function setJoy(x,y){let r=jb.getBoundingClientRect(),cx=r.left+60,cy=r.top+60,dx=x-cx,dy=y-cy,len=Math.hypot(dx,dy)||1,m=Math.min(42,len);dx=dx/len*m;dy=dy/len*m;js.style.left=35+dx+'px';js.style.top=35+dy+'px';keys.KeyW=dy<-12;keys.KeyS=dy>12;keys.KeyA=dx<-12;keys.KeyD=dx>12}jb.addEventListener('touchstart',e=>{active=true;setJoy(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});jb.addEventListener('touchmove',e=>{if(active)setJoy(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});jb.addEventListener('touchend',()=>{active=false;js.style.left='35px';js.style.top='35px';keys.KeyW=keys.KeyS=keys.KeyA=keys.KeyD=false});hold('btnFly','Space');hold('btnDash','ShiftLeft');document.getElementById('btnPunch').ontouchstart=e=>{punch(false);e.preventDefault()};document.getElementById('btnHeavy').ontouchstart=e=>{punch(true);e.preventDefault()};let lx=0,ly=0,look=false;addEventListener('touchstart',e=>{if(e.touches.length===1&&e.touches[0].clientX>innerWidth*.35){look=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}},{passive:false});addEventListener('touchmove',e=>{if(look&&e.touches.length===1){let t=e.touches[0];yaw-=(t.clientX-lx)*.0038;pitch-=(t.clientY-ly)*.0034;pitch=Math.max(-1.57065,Math.min(1.57065,pitch));lx=t.clientX;ly=t.clientY}},{passive:false});addEventListener('touchend',()=>look=false)}function hold(id,code){let el=document.getElementById(id);el.addEventListener('touchstart',e=>{keys[code]=true;e.preventDefault()},{passive:false});el.addEventListener('touchend',()=>keys[code]=false)}
function animate(){requestAnimationFrame(animate);let dt=Math.min(.033,clock.getDelta());if(started&&!gameOver){autoLock();updatePlayer(dt);updateTrigg(dt);updateEnemies(dt);updatePeople(dt);updateDestroyerEnding(dt);updateCamera(dt);updateUI(dt)}updateParticles(dt);renderer.render(scene,camera)}try{init();}catch(err){console.error(err);if(overlay){overlay.style.display='flex';overlay.innerHTML='<div class=\"deathCard errorScreen\"><div class=\"deathKicker\">BOOT ERROR</div><h1>启动失败</h1><div class=\"deathReason\">脚本初始化出错：'+(err&&err.message?err.message:err)+'</div><button onclick=\"location.reload()\">重新加载</button></div>';}}})();
